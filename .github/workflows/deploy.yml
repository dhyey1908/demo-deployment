name: Deploy SAM Demo Backend

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy.yml"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1
      WORKING_DIRECTORY: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Install backend dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm install

      - name: Generate template.yaml
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm run generate-template

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::311376802787:role/github-demo-deployment
          role-session-name: github-actions-sam-deploy

      - name: Build SAM application
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: sam build --template-file template.yaml

      - name: Deploy SAM application
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: >
          sam deploy
          --stack-name serverless-demo
          --region "$AWS_REGION"
          --s3-bucket sam-artifacts-serverless-demo-1234
          --capabilities CAPABILITY_IAM
          --no-confirm-changeset
          --no-fail-on-empty-changeset
          --parameter-overrides StageName=stag EnableLocalAdapter=false
