AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Swagger-driven demo backend generated from api_gateway/api-gateway-export.json

Globals:
  Function:
    Runtime: nodejs22.x
    Timeout: 10
    MemorySize: 128
    Architectures:
      - x86_64
    Environment:
      Variables:
        STAGE_NAME: !Ref StageName

Parameters:
  StageName:
    Type: String
    Default: stag
    AllowedValues:
      - stag
      - prod
  EnableLocalAdapter:
    Type: String
    Default: false
    AllowedValues:
      - true
      - false

Conditions:
  CreateLocalAdapter: !Equals [!Ref EnableLocalAdapter, 'true']

Resources:
  DemoApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub serverless-demo-api-${StageName}
      StageName: !Ref StageName
      EndpointConfiguration: REGIONAL
      TracingEnabled: true

  DemoCommonLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub demo_common-${StageName}
      Description: Lambda layer for demo_common
      ContentUri: layers/demo_common/
      CompatibleRuntimes:
        - nodejs22.x
      RetentionPolicy: Retain

  DemoUtilsLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub demo_utils-${StageName}
      Description: Lambda layer for demo_utils
      ContentUri: layers/demo_utils/
      CompatibleRuntimes:
        - nodejs22.x
      RetentionPolicy: Retain

  DemoAuthApi:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub demo_auth_api_${StageName}
      CodeUri: generated_lambda_functions/demo_auth_api/
      Handler: index.handler
      Events:
        ApiEvent1:
          Type: Api
          Properties:
            RestApiId: !Ref DemoApi
            Path: /login
            Method: POST
        ApiEvent2:
          Type: Api
          Properties:
            RestApiId: !Ref DemoApi
            Path: /logout
            Method: POST

  DemoDashboardApi:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub demo_dashboard_api_${StageName}
      CodeUri: generated_lambda_functions/demo_dashboard_api/
      Handler: index.handler
      Events:
        ApiEvent1:
          Type: Api
          Properties:
            RestApiId: !Ref DemoApi
            Path: /dashboard/get_summary
            Method: GET
        ApiEvent2:
          Type: Api
          Properties:
            RestApiId: !Ref DemoApi
            Path: /dashboard/get_today_attendance
            Method: GET

  DemoEmployeeApi:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub demo_employee_api_${StageName}
      CodeUri: generated_lambda_functions/demo_employee_api/
      Handler: index.handler
      Layers:
        - !Ref DemoCommonLayer
      Events:
        ApiEvent1:
          Type: Api
          Properties:
            RestApiId: !Ref DemoApi
            Path: /employee/list
            Method: GET
        ApiEvent2:
          Type: Api
          Properties:
            RestApiId: !Ref DemoApi
            Path: /employee/add
            Method: POST

  DemoReportsApi:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub demo_reports_api_${StageName}
      CodeUri: generated_lambda_functions/demo_reports_api/
      Handler: index.handler
      Environment:
        Variables:
          REPORT_SOURCE: "internal"
          REPORT_REGION: "us-east-1"
      Layers:
        - !Ref DemoCommonLayer
        - !Ref DemoUtilsLayer
      Events:
        ApiEvent1:
          Type: Api
          Properties:
            RestApiId: !Ref DemoApi
            Path: /report
            Method: POST

  DemoSimpleApi:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub demo_simple_api_${StageName}
      CodeUri: generated_lambda_functions/demo_simple_api/
      Handler: index.handler
      Layers:
        - !Ref DemoCommonLayer
      Events:
        ApiEvent1:
          Type: Api
          Properties:
            RestApiId: !Ref DemoApi
            Path: /simple/get
            Method: GET

  DemoBackgroundJob:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub demo_background_job_${StageName}
      CodeUri: generated_lambda_functions/demo_background_job/
      Handler: index.handler
      Layers:
        - !Ref DemoCommonLayer
        - !Ref DemoUtilsLayer

  LocalApiAdapter:
    Type: AWS::Serverless::Function
    Condition: CreateLocalAdapter
    Properties:
      FunctionName: !Sub demo_local_adapter_${StageName}
      CodeUri: local/
      Handler: local_lambda_adapter.handler
      Events:
        CatchAllProxy:
          Type: Api
          Properties:
            RestApiId: !Ref DemoApi
            Path: /{proxy+}
            Method: ANY

Outputs:
  ApiBaseUrl:
    Description: API Gateway base URL
    Value: !Sub https://${DemoApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}
